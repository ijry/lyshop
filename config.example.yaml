server:
  port: 8080
  mode: debug   # debug | release

database:
  # 默认 SQLite（开箱即用）
  dsn: "lyshop.db"
  # MySQL 示例：
  # dsn: "root:password@tcp(mysql:3306)/lyshop?charset=utf8mb4&parseTime=True&loc=Local"
  max_open: 1
  max_idle: 1

redis:
  # 留空时自动启用进程内嵌 Redis（适合个人本机单机使用）
  addr: ""
  # 容器/独立 Redis 示例：
  # addr: "redis:6379"
  password: ""
  db: 0

jwt:
  secret: "change-this-to-a-random-string"
  expire_hours: 168   # 7 days

inventory:
  provider: local           # local | builtin_wms | external_wms
  external_mode: sync       # sync | async

external_wms:
  endpoint: ""
  app_key: ""
  app_secret: ""
  timeout_ms: 3000
  callback_enabled: true
  signature_ttl: 300
  worker_interval_sec: 5
  retry:
    max_attempts: 8
    backoff_seconds: 30

plugins:
  enabled:
    # Core commerce
    - product
    - order
    - marketing
    # Communication
    - im
    - message
    # Marketing extensions
    - checkin
    - distribution
    # Delivery drivers + router
    - delivery_express
    - delivery_local
    - delivery_router
    # Logistics drivers + router
    - logistics_kuaidi100
    - logistics_kdniao
    - logistics_router
    # Content
    - decor
    - ai_image
    # Payment drivers (enable the ones you need)
    - wechat_pay
    - alipay
    # Service drivers
    - sms
    - wechat_auth
    # Storage driver (enable ONE)
    - storage_router
    - storage_local
    - storage_oss
    - storage_cos
    - storage_qiniu
