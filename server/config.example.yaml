server:
  port: 8080
  mode: debug

database:
  dsn: "root:password@tcp(127.0.0.1:3306)/lyshop?charset=utf8mb4&parseTime=True&loc=Local"
  max_open: 100
  max_idle: 10

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

jwt:
  secret: "your-secret-key-change-in-production"
  expire_hours: 168

inventory:
  provider: local
  external_mode: sync

external_wms:
  endpoint: ""
  app_key: ""
  app_secret: ""
  timeout_ms: 3000
  callback_enabled: true
  signature_ttl: 300
  worker_interval_sec: 5
  retry:
    max_attempts: 8
    backoff_seconds: 30

plugins:
  enabled:
    - product
    - order
    - marketing
    - seckill
    - group_buy
    - bargain
    - points_mall
    - vip
    - checkin
    - message
    - im
    - decor
    - ai_image
