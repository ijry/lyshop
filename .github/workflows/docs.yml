name: Docs

on:
  push:
    branches: [master]
    paths:
      - "docs-site/**"
      - "app/**"
      - "web/**"
      - "admin/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [master]
    paths:
      - "docs-site/**"
      - "app/**"
      - "web/**"
      - "admin/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install app dependencies
        working-directory: app
        run: rm -f package-lock.json && npm install --legacy-peer-deps

      - name: Install app Linux native bindings
        working-directory: app
        run: npm install --no-save --legacy-peer-deps @oxc-parser/binding-linux-x64-gnu@0.131.0

      - name: Rebuild app native optional deps
        working-directory: app
        run: npm rebuild esbuild rollup --foreground-scripts

      - name: Build H5 demo (mock data)
        working-directory: app
        run: node scripts/build-demo.js

      - name: Install web dependencies
        working-directory: web
        run: rm -f package-lock.json && npm install

      - name: Build PC demo (mock data)
        working-directory: web
        run: npx cross-env VITE_MOCK=true npx vite build --base /lyshop/web-demo/ --outDir ../docs-site/docs/public/web-demo

      - name: Install admin dependencies
        working-directory: admin
        run: rm -f package-lock.json && npm install

      - name: Build admin demo (mock data)
        working-directory: admin
        run: npx cross-env VITE_MOCK=true npx vite build --base /lyshop/admin-demo/ --outDir ../docs-site/docs/public/admin-demo

      - name: Install docs dependencies
        working-directory: docs-site
        run: rm -f package-lock.json && npm install

      - name: Build docs
        working-directory: docs-site
        run: npm run docs:build

      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/docs/.vitepress/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
